name: FFR Outcome Marker
on:
  schedule:
    - cron: '0 */6 * * *'      # resolve outcomes every 6h
  workflow_dispatch:
    inputs:
      dry_run: { description: "true = compute, no Telegram", default: "false" }
concurrency:
  group: ffr-outcome
  cancel-in-progress: false
jobs:
  mark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install requests
      - name: Run outcome marker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python3 research/ffr/outcome_marker.py
      - name: Commit outcomes (race-proof)
        if: success()
        run: |
          git config user.name "ffr-paper[bot]"
          git config user.email "ffr-paper[bot]@users.noreply.github.com"
          git add research/ffr/paper_signals.json 2>/dev/null || true
          if git diff --staged --quiet; then echo "no change"; exit 0; fi
          git commit -m "FFR paper: outcomes [skip ci]"
          for n in 1 2 3 4 5; do
            git fetch origin main; git rebase origin/main || git rebase --abort
            if git push origin HEAD:main; then echo pushed; exit 0; fi
            sleep 4
          done
