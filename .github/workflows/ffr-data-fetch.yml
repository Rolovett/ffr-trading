name: FFR Data Fetch
on:
  workflow_dispatch:
    inputs:
      years:
        description: "Years of history to pull"
        default: "2"
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Fetch history
        run: |
          cd research/ffr
          python data_history.py --years "${{ github.event.inputs.years }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ffr-data
          path: research/ffr/data/
      - name: Commit data (race-proof)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/ffr/data/
          git commit -m "FFR: data fetch (${{ github.event.inputs.years }}y)" || { echo "nothing to commit"; exit 0; }
          for n in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            echo "push race — retry $n"; sleep 4
          done
          echo "could not push — data is in the ffr-data artifact"
