name: FFR Cascade Detector
on:
  workflow_dispatch:
    inputs:
      k:        { description: "range >= k*ATR",     default: "3.0" }
      m:        { description: "volume >= m*median",  default: "4.0" }
      target_r: { description: "target in R",         default: "4.0" }
jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas numpy
      - name: Run detector
        run: |
          cd research/ffr
          python cascade_detector.py --k "${{ github.event.inputs.k }}" --m "${{ github.event.inputs.m }}" --target_r "${{ github.event.inputs.target_r }}"
